<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>דשבורד - הבוט של שני</title>
  <link href="https://fonts.googleapis.com/css2?family=Suez+One&family=Assistant:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --warm-cream: #FAF7F2;
      --sand: #EFE7DA;
      --deep-earth: #5C4033;
      --terracotta: #C67D5B;
      --muted-purple: #8B7B8B;
      --charcoal: #2D2A26;
      --dusty-rose: #C9A8A0;
      --gold: #C9A961;
      --good: #7A8450;
      --bad: #a94438;
      --border: #E0D6C4;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Assistant', -apple-system, sans-serif;
      background: var(--sand);
      color: var(--charcoal);
      min-height: 100vh;
    }
    h1, h2 {
      font-family: 'Suez One', serif;
      font-weight: 400;
      color: var(--deep-earth);
    }

    /* Password gate */
    #gate {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 24px;
    }
    #gate input {
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 16px;
      font-family: inherit;
      width: 260px;
      text-align: center;
    }
    #gate button {
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      background: var(--terracotta);
      color: white;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    #gate-error {
      color: var(--bad);
      font-size: 14px;
      min-height: 18px;
    }

    /* Dashboard */
    #dash { display: none; padding: 28px; max-width: 1100px; margin: 0 auto; }
    .kpis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }
    .kpi {
      background: white;
      border-radius: 14px;
      padding: 18px 16px;
      border-right: 4px solid var(--terracotta);
      box-shadow: 0 2px 8px rgba(92, 64, 51, 0.06);
    }
    .kpi .num { font-size: 28px; font-weight: 700; color: var(--deep-earth); }
    .kpi .label { font-size: 13px; color: var(--muted-purple); margin-top: 4px; }

    .card {
      background: white;
      border-radius: 14px;
      padding: 20px 22px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(92, 64, 51, 0.06);
    }
    .card h2 { font-size: 17px; margin: 0 0 14px; }

    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 13px; }
    .bar-label { width: 130px; flex-shrink: 0; color: var(--deep-earth); }
    .bar-track { flex: 1; background: var(--sand); border-radius: 6px; height: 18px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--terracotta); border-radius: 6px; }
    .bar-count { width: 30px; text-align: left; color: var(--muted-purple); }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 8px 10px; text-align: right; border-bottom: 1px solid var(--border); }
    th { color: var(--muted-purple); font-weight: 600; font-size: 12px; }
    .status-הושלם, .status-סיים { color: var(--good); font-weight: 600; }
    .status-ננטש { color: var(--bad); font-weight: 600; }
    .status-התחיל { color: var(--muted-purple); }

    #refresh {
      background: var(--warm-cream);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 16px;
      font-family: inherit;
      cursor: pointer;
      font-size: 13px;
    }
    .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  </style>
</head>
<body>

  <div id="gate">
    <h1>דשבורד הבוט של שני</h1>
    <input type="password" id="pw" placeholder="סיסמה" autocomplete="off" />
    <button id="pw-submit">כניסה</button>
    <div id="gate-error"></div>
  </div>

  <div id="dash">
    <div class="top-row">
      <h1>דשבורד הבוט של שני</h1>
      <button id="refresh">רענון</button>
    </div>

    <div class="kpis" id="kpis"></div>

    <div class="card">
      <h2>איפה אנשים עוזבים (לפי מספר הודעות שנשלחו)</h2>
      <div id="dropoff"></div>
    </div>

    <div class="card">
      <h2>שביעות רצון</h2>
      <div id="satisfaction"></div>
    </div>

    <div class="card">
      <h2>רשימת שיחות</h2>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>תאריך</th>
              <th>שם</th>
              <th>טלפון</th>
              <th>סטטוס</th>
              <th>מגדר</th>
              <th>שביעות רצון</th>
              <th>הודעות</th>
            </tr>
          </thead>
          <tbody id="leads-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const gate = document.getElementById('gate');
    const dash = document.getElementById('dash');
    const pwInput = document.getElementById('pw');
    const gateError = document.getElementById('gate-error');

    async function loadData(password) {
      const res = await fetch('/api/dashboard', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });
      const data = await res.json();
      if (!res.ok || !data.ok) {
        throw new Error(data.error || 'שגיאה');
      }
      return data.rows;
    }

    function render(rows) {
      const total = rows.length;
      const started = rows.filter(r => r['סטטוס'] === 'התחיל').length;
      const completed = rows.filter(r => r['סטטוס'] === 'הושלם' || r['סטטוס'] === 'סיים').length;
      const abandoned = rows.filter(r => r['סטטוס'] === 'ננטש').length;
      const finished = completed + abandoned;
      const conversionRate = finished > 0 ? Math.round((completed / finished) * 100) : 0;

      const kpis = document.getElementById('kpis');
      kpis.innerHTML = `
        <div class="kpi"><div class="num">${total}</div><div class="label">סה"כ אינטראקציות</div></div>
        <div class="kpi"><div class="num">${completed}</div><div class="label">הושלמו</div></div>
        <div class="kpi"><div class="num">${abandoned}</div><div class="label">ננטשו</div></div>
        <div class="kpi"><div class="num">${conversionRate}%</div><div class="label">שיעור השלמה</div></div>
      `;

      // Drop-off by message count, among abandoned rows only
      const dropoffEl = document.getElementById('dropoff');
      const abandonedRows = rows.filter(r => r['סטטוס'] === 'ננטש');
      if (abandonedRows.length === 0) {
        dropoffEl.innerHTML = '<p style="color:var(--muted-purple);font-size:14px">אין עדיין נתוני נטישה</p>';
      } else {
        const buckets = {};
        abandonedRows.forEach(r => {
          const mc = r['מספר הודעות'];
          const key = (mc === '' || mc === undefined || mc === null) ? '0' : String(mc);
          buckets[key] = (buckets[key] || 0) + 1;
        });
        const maxCount = Math.max(...Object.values(buckets));
        const labels = {
          '0': 'לפני שתיארו כאב',
        };
        dropoffEl.innerHTML = Object.keys(buckets).sort((a, b) => Number(a) - Number(b)).map(key => {
          const count = buckets[key];
          const pct = Math.round((count / maxCount) * 100);
          const label = labels[key] || `אחרי ${key} הודעות`;
          return `
            <div class="bar-row">
              <div class="bar-label">${label}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
              <div class="bar-count">${count}</div>
            </div>
          `;
        }).join('');
      }

      // Satisfaction distribution (only among rows that answered)
      const satEl = document.getElementById('satisfaction');
      const satRows = rows.filter(r => r['שביעות רצון']);
      if (satRows.length === 0) {
        satEl.innerHTML = '<p style="color:var(--muted-purple);font-size:14px">אין עדיין נתוני שביעות רצון</p>';
      } else {
        const satBuckets = {};
        satRows.forEach(r => {
          const v = r['שביעות רצון'];
          satBuckets[v] = (satBuckets[v] || 0) + 1;
        });
        const maxSat = Math.max(...Object.values(satBuckets));
        const order = ['מאוד', 'חלקית', 'לא כל כך'];
        satEl.innerHTML = order.filter(k => satBuckets[k]).map(key => {
          const count = satBuckets[key];
          const pct = Math.round((count / maxSat) * 100);
          return `
            <div class="bar-row">
              <div class="bar-label">${key}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
              <div class="bar-count">${count}</div>
            </div>
          `;
        }).join('');
      }

      // Leads table, most recent first
      const tbody = document.getElementById('leads-body');
      const sorted = [...rows].sort((a, b) => new Date(b['זמן התחלה']) - new Date(a['זמן התחלה']));
      tbody.innerHTML = sorted.map(r => {
        const date = r['זמן התחלה'] ? new Date(r['זמן התחלה']).toLocaleString('he-IL', { day: 'numeric', month: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
        const status = r['סטטוס'] || '';
        return `
          <tr>
            <td>${date}</td>
            <td>${escapeHtml(r['שם'] || '')}</td>
            <td>${escapeHtml(r['טלפון'] || '')}</td>
            <td class="status-${status}">${status}</td>
            <td>${escapeHtml(r['מגדר'] || '')}</td>
            <td>${escapeHtml(r['שביעות רצון'] || '')}</td>
            <td>${r['מספר הודעות'] !== undefined ? r['מספר הודעות'] : ''}</td>
          </tr>
        `;
      }).join('');
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    async function tryEnter(password) {
      gateError.textContent = '';
      try {
        const rows = await loadData(password);
        sessionStorage.setItem('dash_pw', password);
        gate.style.display = 'none';
        dash.style.display = 'block';
        render(rows);
      } catch (e) {
        gateError.textContent = e.message || 'שגיאה בהתחברות';
      }
    }

    document.getElementById('pw-submit').addEventListener('click', () => tryEnter(pwInput.value));
    pwInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryEnter(pwInput.value); });

    document.getElementById('refresh').addEventListener('click', async () => {
      const pw = sessionStorage.getItem('dash_pw');
      if (!pw) return;
      const rows = await loadData(pw);
      render(rows);
    });

    // Auto-login if we already have a password from this session
    const savedPw = sessionStorage.getItem('dash_pw');
    if (savedPw) tryEnter(savedPw);
  </script>
</body>
</html>
